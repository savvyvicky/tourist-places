<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>sauvik</title>
  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(180deg, #eef5ff 0%, #fdfcff 100%); color: #16324a; margin: 0; padding: 0; }
    header { background: linear-gradient(135deg, #1f4978 0%, #3f81c1 100%); color: #fff; padding: 20px 18px; text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 8px 20px rgba(31, 73, 120, 0.18); }
    header h2 { margin: 0; font-size: 1.4rem; letter-spacing: 0.02em; }
    nav { margin-top: 14px; display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }
    nav a { color: #f1f7ff; text-decoration: none; font-weight: 700; padding: 10px 14px; border-radius: 999px; background: rgba(255,255,255,0.18); transition: background 0.25s ease, transform 0.25s ease; }
    nav a:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
    .container { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 90px); padding: 20px; }
    .card { background: #fff; padding: 40px; border-radius: 24px; box-shadow: 0 18px 40px rgba(18, 52, 69, 0.12); text-align: center; max-width: 520px; width: 100%; }
    h1 { margin: 0; font-size: clamp(2.2rem, 4vw, 3.2rem); letter-spacing: 0.08em; }
    h2 { margin: 14px 0 0; font-size: 1.3rem; color: #2b5d7a; }
    p { margin: 18px 0 0; color: #4a5b72; line-height: 1.75; font-size: 1rem; }
    .card-links { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
    a { display: inline-block; color: #1f4978; text-decoration: none; font-weight: 700; padding: 12px 18px; background: #eef6ff; border-radius: 12px; transition: background 0.25s ease, transform 0.25s ease; }
    a:hover { background: #d7e7ff; transform: translateY(-1px); }
    @media (max-width: 700px) { nav { flex-direction: column; gap: 10px; } .card { padding: 28px; } h1 { font-size: 2.4rem; } }
    @media (max-width: 520px) { .container { padding: 16px; } .card { padding: 22px; } h1 { font-size: 2rem; } p { font-size: 0.95rem; } }
    
  </style>
</head>
<body>
  <header>
    <h2>Welcome</h2>
    <nav>
      <a href="myname.html">Tourist Places</a>
      <a href="states.html">Top States</a>
      <a href="activities.html">Activities</a>
    </nav>
  </header>
  <div class="container">
    <div class="card">
      <h1>Hello, I'm sauvik</h1>
      <p>This page introduces the name "sauvik" and showcases a tourism guide across India with diverse travel experiences.</p>
      <div class="card-links">
        <a href="myname.html">View Tourist Places</a>
      </div>
    </div>
  </div>
</body>
</html>
